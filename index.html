<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Display</title>
    <meta name="description" content="Ultimate Display System — Clock, Text Marquee, Fake Update & Digital Album">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/clock.css">
    <link rel="stylesheet" href="styles/text.css">
    <link rel="stylesheet" href="styles/update.css">
    <link rel="stylesheet" href="styles/typing.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body class="theme-oled">

    <!-- Navigation -->
    <nav id="main-nav">
        <div class="nav-tabs">
            <button class="nav-btn active" data-tab="clock">Clock</button>
            <button class="nav-btn" data-tab="text">Text</button>
            <button class="nav-btn" data-tab="typing">Typing SVG</button>
            <button class="nav-btn" data-tab="update">Fake Update</button>
        </div>
        <div class="nav-spacer"></div>
        <button id="fullscreen-btn" class="icon-btn" title="Fullscreen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
        </button>
        <button id="settings-btn" class="icon-btn" title="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
    </nav>

    <!-- Main Content -->
    <main id="app-container">
        <!-- Clock Tab -->
        <section id="clock-tab" class="tab-content active">
            <div id="clock-container"></div>
            <div id="clock-controls" class="controls-overlay"></div>
        </section>

        <!-- Text Tab -->
        <section id="text-tab" class="tab-content">
            <canvas id="text-canvas"></canvas>
            <div id="text-controls" class="controls-overlay"></div>
        </section>

        <!-- Fake Update Tab -->
        <section id="update-tab" class="tab-content">
            <div id="update-simulation"></div>
            <div id="update-menu" class="selection-menu">
                <h2>System Update Simulation</h2>
                <p style="opacity:0.45;font-size:0.8rem;margin-top:4px;">Choose an OS to simulate a fake update screen
                </p>
                <div class="os-grid"></div>
                <div class="instructions">
                    <p>Press <strong>F11</strong> for Fullscreen. Cursor hides automatically.</p>
                    <p>Press <strong>Enter</strong> or <strong>Esc</strong> to exit simulation.</p>
                </div>
            </div>
        </section>

        <!-- Typing SVG Tab -->
        <section id="typing-tab" class="tab-content">
        </section>
    </main>

    <!-- Settings Modal -->
    <div id="global-settings" class="modal hidden">
        <div class="modal-content">
            <h2>Settings</h2>

            <!-- Appearance -->
            <div class="settings-section">
                <h3>Appearance</h3>
                <div class="setting-row">
                    <label>Theme</label>
                    <select id="theme-select">
                        <option value="theme-light">Light</option>
                        <option value="theme-oled" selected>AMOLED Black</option>
                        <option value="theme-adaptive">Adaptive</option>
                    </select>
                </div>
            </div>

            <!-- Clock Settings -->
            <div class="settings-section">
                <h3>Clock</h3>
                <div class="setting-row">
                    <label>Show Seconds</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="setting-show-seconds" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <label>Show Date</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="setting-show-date" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <label>24-Hour Format</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="setting-24h" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <label>Show AM/PM</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="setting-show-ampm" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <label>Timezone</label>
                    <select id="setting-timezone"></select>
                </div>
            </div>

            <!-- Text Settings -->
            <div class="settings-section">
                <h3>Text Marquee</h3>
                <div class="setting-row">
                    <label>Direction</label>
                    <select id="setting-text-direction">
                        <option value="left">Left</option>
                        <option value="right">Right</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>Opacity</label>
                    <input type="range" id="setting-text-opacity" min="0.1" max="1" step="0.1" value="1">
                </div>
                <div class="setting-row">
                    <label>Blur Effect</label>
                    <input type="range" id="setting-text-blur" min="0" max="10" step="1" value="0">
                </div>
            </div>

            <button id="close-settings" class="modal-close-btn">Done</button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
